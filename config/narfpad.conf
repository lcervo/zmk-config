# BLE only - USB not needed (bootloader handles flashing)
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Reconnect without re-pairing
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y

# Boost BLE transmit power for reliable connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep after 15 min idle to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
